<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
    <script>
    // Streamlit Component Protocol
    function sendMessageToStreamlitClient(type, data) {
        var outData = Object.assign({
            isStreamlitMessage: true,
            type: type,
        }, data);
        window.parent.postMessage(outData, "*");
    }

    function setComponentValue(value) {
        sendMessageToStreamlitClient("streamlit:setComponentValue", { value: value });
    }

    let dashboardWindow = null;

    // Python -> JS (Streamlit Render Event)
    window.addEventListener("message", function(event) {
        if (event.data.type === "streamlit:render") {
            const args = event.data.args;
            if (args.ai_report_json) {
                if (dashboardWindow) {
                    try {
                        dashboardWindow.postMessage({
                            type: "AI_DIAGNOSE_RES",
                            payload: args.ai_report_json
                        }, "*");
                    } catch(e) {
                        console.error("Direct postMessage failed", e);
                    }
                }
                
                // Fallback broadcast
                try {
                    for (let i = 0; i < window.parent.frames.length; i++) {
                        try {
                            window.parent.frames[i].postMessage({
                                type: "AI_DIAGNOSE_RES",
                                payload: args.ai_report_json
                            }, "*");
                        } catch(e) {}
                    }
                } catch(e) {
                    console.error("Broadcast failed due to cross-origin restriction", e);
                }
                
                try {
                    localStorage.setItem("AI_DIAGNOSE_RES", args.ai_report_json);
                } catch(e) {}
            }
        }
    });
    
    // JS -> Python (LocalStorage Event from sibling iframe)
    window.addEventListener("storage", function(e) {
        if (e.key === "AI_DIAGNOSE_REQ" && e.newValue) {
            setComponentValue(e.newValue);
        }
    });

    // JS -> Python (postMessage Event from sibling iframe)
    window.addEventListener("message", function(e) {
        if (e.data && e.data.type === "AI_DIAGNOSE_REQ" && e.data.payload) {
            // 보낸 쪽의 Window 객체를 저장해둠 (나중에 응답을 보내기 위해)
            if (e.source) {
                dashboardWindow = e.source;
            }
            // 대시보드(IFrame)에서 보낸 요청 페이로드를 파이썬으로 전송!
            setComponentValue(e.data.payload);
        }
    });

    // Initialize Component
    sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1});
    sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: 0});
    </script>
</body>
</html>
